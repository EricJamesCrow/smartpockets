name: Checks

# Fast quality gate on every PR: typecheck + lint + backend unit tests.
# Complements e2e.yml (Playwright), which only runs for app/backend/ui paths.
on:
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: checks-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: typecheck + lint + unit
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # CROWDEV-462: the paid UntitledUI source is untracked. Restore it
            # before install/typecheck. Falls back to pinned public history
            # when UNTITLEDUI_REPO_TOKEN is unset.
            - name: Restore UntitledUI source (paid kit, untracked)
              env:
                  UNTITLEDUI_REPO_TOKEN: ${{ secrets.UNTITLEDUI_REPO_TOKEN }}
              run: bash scripts/fetch-private-ui.sh

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  # Match the version that wrote `bun.lock` (see e2e.yml).
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Typecheck
              run: bun typecheck

            - name: Lint
              run: bun lint

            - name: Backend unit tests
              working-directory: packages/backend
              run: bunx vitest run --typecheck
