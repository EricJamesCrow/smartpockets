name: E2E (Playwright)

# Triggered on PRs touching the chat app, the backend code under test, or the
# workflow itself. Skipped for paths-only-affecting docs/web-marketing/etc.
# to keep CI minutes proportional to risk.
on:
    pull_request:
        branches: [main]
        paths:
            - "apps/app/**"
            - "packages/backend/convex/**"
            - "packages/ui/src/components/**"
            - ".github/workflows/e2e.yml"
    workflow_dispatch:

# Cancel in-flight runs from the same PR to avoid stacking up while iterating.
concurrency:
    group: e2e-${{ github.ref }}
    cancel-in-progress: true

jobs:
    playwright:
        name: playwright (chromium)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            # Clerk dev keys for the e2e Clerk instance. NEVER use production
            # keys here — production Clerk would reject this hostname anyway.
            CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
            # Test user that signs in via `clerk.signIn` from
            # @clerk/testing/playwright.
            E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
            E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
            # Dev/staging Convex deployment the seed mutations run against.
            # `agent.threads.createTestThread` refuses to run on `prod:*`
            # deployments, defending against accidental misconfiguration.
            NEXT_PUBLIC_CONVEX_URL: ${{ secrets.E2E_CONVEX_URL }}
            CONVEX_DEPLOYMENT: ${{ secrets.E2E_CONVEX_DEPLOYMENT }}
            # Misc Clerk URLs (read by `apps/app`'s middleware to compute
            # post-auth redirects).
            NEXT_PUBLIC_CLERK_FRONTEND_API_URL: ${{ secrets.E2E_CLERK_FRONTEND_API_URL }}
            CI: "true"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.1.42

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: pw-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('apps/app/package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-

            - name: Install Playwright (Chromium + system deps)
              if: steps.pw-cache.outputs.cache-hit != 'true'
              working-directory: apps/app
              run: bunx playwright install --with-deps chromium

            - name: Install Playwright system deps (cache hit)
              if: steps.pw-cache.outputs.cache-hit == 'true'
              working-directory: apps/app
              run: bunx playwright install-deps chromium

            - name: Run Playwright tests
              working-directory: apps/app
              run: bun run test:e2e

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      apps/app/playwright-report/
                      apps/app/test-results/
                  retention-days: 14
